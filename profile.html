<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>profile — slop.game</title>
<meta name="description" content="a slop.game creator's published games.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23FF4EB8%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 font-family=%22system-ui,sans-serif%22 font-size=%2248%22 font-weight=%22700%22 fill=%22%23FFFFFF%22>S</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/sections.css">
<link rel="stylesheet" href="css/ai.css">
<link rel="stylesheet" href="css/v2.css">
<link rel="stylesheet" href="css/brand.css">
<link rel="stylesheet" href="css/browse.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/profile.css">
</head>
<body>

<div id="toast-container"></div>

<!-- ============ NAV ============ -->
<nav class="site-nav">
  <a class="brand" href="/">
    <span class="wordmark">slop<span class="dot-pk">.</span>game</span>
  </a>
  <div class="nav-links" id="nav-links">
    <a href="/#games">Browse</a>
    <a href="studio.html" class="nav-studio">Studio</a>
    <a href="/#publish">Publish</a>
  </div>
  <div class="nav-right">
    <span id="nav-auth"></span>
    <button class="nav-burger" id="nav-burger" aria-label="menu">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
  </div>
</nav>

<main class="pf-wrap">
  <div id="pf-body" hidden>
    <div class="pf-cover"></div>
    <header class="pf-head">
      <div class="pf-avatar" id="pf-avatar">S</div>
      <div class="pf-id">
        <h1 class="pf-name" id="pf-name">@user</h1>
        <div class="pf-handle" id="pf-handle"></div>
        <div class="pf-stats">
          <div class="pf-stat"><b id="pf-followers">0</b><span>followers</span></div>
          <div class="pf-stat"><b id="pf-games-count">0</b><span>games</span></div>
        </div>
      </div>
      <div class="pf-actions" id="pf-actions"></div>
    </header>

    <h2 class="pf-section-title">Games <span class="count" id="pf-grid-count">0</span></h2>
    <div class="games-grid browse-grid" id="pf-grid"></div>
  </div>

  <div id="pf-status"></div>
</main>

<!-- edit-profile modal -->
<div class="pf-modal hidden" id="pf-edit">
  <div class="pf-card">
    <h3>Edit profile</h3>
    <p class="sub">this is how you show up across slop.game.</p>
    <div class="pf-field">
      <label>Profile picture</label>
      <div class="pf-avatar-edit">
        <div class="pf-avatar-prev" id="pf-edit-prev">S</div>
        <div>
          <input type="file" id="pf-edit-file" accept="image/*">
        </div>
      </div>
    </div>
    <div class="pf-field">
      <label for="pf-edit-name">Display name</label>
      <input type="text" id="pf-edit-name" placeholder="your name" maxlength="40">
    </div>
    <div class="pf-error" id="pf-edit-error"></div>
    <div class="pf-row">
      <button class="pf-btn ghost" id="pf-edit-cancel" type="button">Cancel</button>
      <button class="pf-btn" id="pf-edit-save" type="button">Save</button>
    </div>
  </div>
</div>

<script type="module" src="js/profile.js"></script>
</body>
</html>

<main class="pf-wrap">
  <div id="pf-body" hidden>
    <div class="pf-banner">
      <div class="pf-cover" id="pf-cover"></div>
      <div class="pf-banner-deco" aria-hidden="true">
        <span class="pf-deco pf-deco-1"></span>
        <span class="pf-deco pf-deco-2"></span>
        <span class="pf-deco pf-deco-3"></span>
      </div>
    </div>

    <div class="pf-panel" id="pf-panel">
      <header class="pf-hero">
        <div class="pf-avatar-wrap">
          <div class="pf-avatar-ring"></div>
          <div class="pf-avatar" id="pf-avatar">S</div>
        </div>
        <div class="pf-identity">
          <div class="pf-name-row">
            <h1 class="pf-name" id="pf-name">@user</h1>
            <span class="pf-badge" id="pf-member" hidden></span>
          </div>
          <div class="pf-handle" id="pf-handle"></div>
          <p class="pf-tagline" id="pf-tagline" hidden></p>
        </div>
      </header>

      <p class="pf-bio" id="pf-bio" hidden></p>
      <a class="pf-link" id="pf-link" target="_blank" rel="noopener nofollow ugc" hidden></a>

      <div class="pf-stats">
        <div class="pf-stat">
          <span class="pf-stat-icon" aria-hidden="true">▶</span>
          <b id="pf-plays">0</b>
          <span>plays</span>
        </div>
        <div class="pf-stat">
          <span class="pf-stat-icon" aria-hidden="true">♥</span>
          <b id="pf-followers">0</b>
          <span>followers</span>
        </div>
        <div class="pf-stat">
          <span class="pf-stat-icon" aria-hidden="true">🎮</span>
          <b id="pf-games-count">0</b>
          <span>games</span>
        </div>
      </div>

      <div class="pf-actions" id="pf-actions"></div>
    </div>

    <section class="pf-games-sec">
      <div class="pf-games-head">
        <h2 class="pf-section-title">Games</h2>
        <span class="pf-section-count" id="pf-grid-count">0</span>
      </div>
      <div class="pf-games-grid" id="pf-grid"></div>
    </section>
  </div>

  <div id="pf-status"></div>
</main>

<!-- edit-profile modal -->
<div class="pf-modal hidden" id="pf-edit">
  <div class="pf-card">
    <div class="pf-card-head">
      <h3>Customize profile</h3>
      <p class="sub">make your creator page yours — cover, colors, bio, all of it.</p>
    </div>

    <div class="pf-edit-grid">
      <div class="pf-edit-col">
        <div class="pf-field">
          <label>Profile picture</label>
          <div class="pf-avatar-edit">
            <div class="pf-avatar-prev" id="pf-edit-prev">S</div>
            <div class="pf-upload-wrap">
              <input type="file" id="pf-edit-file" accept="image/*">
              <span class="pf-upload-hint">jpg, png, gif · max 3 MB</span>
            </div>
          </div>
        </div>

        <div class="pf-field">
          <label>Cover theme</label>
          <div class="pf-theme-grid" id="pf-edit-themes" role="radiogroup" aria-label="Cover theme"></div>
        </div>

        <div class="pf-field">
          <label>Accent color</label>
          <div class="pf-accent-grid" id="pf-edit-accents" role="radiogroup" aria-label="Accent color"></div>
        </div>
      </div>

      <div class="pf-edit-col">
        <div class="pf-field">
          <label for="pf-edit-name">Display name</label>
          <input type="text" id="pf-edit-name" placeholder="your name" maxlength="40">
        </div>
        <div class="pf-field">
          <label for="pf-edit-tagline">Tagline</label>
          <input type="text" id="pf-edit-tagline" placeholder="one-liner under your name…" maxlength="80">
          <div class="pf-charcount"><span id="pf-tagline-count">0</span>/80</div>
        </div>
        <div class="pf-field">
          <label for="pf-edit-bio">Bio</label>
          <textarea id="pf-edit-bio" placeholder="tell people what you make…" maxlength="300" rows="4"></textarea>
          <div class="pf-charcount"><span id="pf-bio-count">0</span>/300</div>
        </div>
        <div class="pf-field">
          <label for="pf-edit-link">Link</label>
          <input type="text" id="pf-edit-link" placeholder="yoursite.com" maxlength="200">
        </div>
      </div>
    </div>

    <div class="pf-preview" id="pf-edit-preview" aria-hidden="true">
      <div class="pf-preview-cover" id="pf-preview-cover"></div>
      <div class="pf-preview-body">
        <div class="pf-preview-avatar" id="pf-preview-avatar">S</div>
        <div class="pf-preview-name" id="pf-preview-name">your name</div>
      </div>
    </div>

    <div class="pf-error" id="pf-edit-error"></div>
    <div class="pf-row">
      <button class="pf-btn ghost" id="pf-edit-cancel" type="button">Cancel</button>
      <button class="pf-btn" id="pf-edit-save" type="button">Save changes</button>
    </div>
  </div>
</div>

<script type="module" src="js/profile.js"></script>
</body>
</html>

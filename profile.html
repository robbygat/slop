<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>profile — SLOP.game</title>
<meta name="description" content="a SLOP.game creator's published games.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23FF4EB8%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 font-family=%22system-ui,sans-serif%22 font-size=%2248%22 font-weight=%22700%22 fill=%22%23FFFFFF%22>S</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/ai.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/v2.css">
<link rel="stylesheet" href="css/brand.css">
<link rel="stylesheet" href="css/search.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/profile.css">
<link rel="stylesheet" href="css/pricing.css">
</head>
<body class="pf-root">

<div class="pf-shader" id="pf-shader" aria-hidden="true"></div>
<div id="toast-container"></div>

<nav class="site-nav">
  <a class="brand" href="/">
    <span class="wordmark">SLOP<span class="dot-pk">.</span>game</span>
  </a>
  <div class="nav-links" id="nav-links">
    <div class="nav-drawer-search">
      <label class="nav-search nav-search-drawer" for="nav-drawer-search-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="nav-drawer-search-input" placeholder="search players &amp; games…" autocomplete="off">
      </label>
    </div>
    <a href="/#games">Browse</a>
    <a href="studio.html" class="nav-studio">Studio</a>
    <a href="/#multiplayer">Multiplayer</a>
    <a href="/#publish">Publish</a>
    <a class="nav-drawer-profile" href="studio.html">Cook a Game</a>
    <div class="nav-drawer-account" id="nav-drawer-account" hidden></div>
  </div>
  <div class="nav-right">
    <label class="nav-search nav-search-bar" for="nav-search-input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="nav-search-input" placeholder="search…" autocomplete="off">
    </label>
    <span id="nav-auth"></span>
    <button class="nav-burger" id="nav-burger" type="button" aria-label="menu" aria-expanded="false" aria-controls="nav-links">
      <span class="nav-burger-lines" aria-hidden="true"></span>
    </button>
  </div>
</nav>

<div id="pf-shell" hidden>
  <div class="pf-scene" aria-hidden="true">
    <div class="pf-scene-grid"></div>
  </div>
  <div class="pf-stage">
    <div class="pf-cover-zone">
      <div class="pf-banner-glow" aria-hidden="true">
        <div class="pf-banner-glow-spin">
          <div class="pf-banner-glow-ring"></div>
        </div>
      </div>
      <div class="pf-banner" id="pf-banner">
        <img class="pf-banner-img" id="pf-banner-img" alt="" hidden>
        <div class="pf-banner-default" id="pf-banner-default" aria-hidden="true"></div>
      </div>
    </div>

    <div class="pf-card" id="pf-page">
      <div class="pf-identity">
        <div class="pf-avatar-slot">
          <div class="pf-avatar-ring" aria-hidden="true"></div>
          <div class="pf-avatar" id="pf-avatar">S</div>
          <span class="pf-level-badge" id="pf-level-badge" hidden></span>
        </div>

        <div class="pf-id">
          <div class="pf-id-top">
            <div class="pf-names">
              <span class="pf-creator-tag">creator</span>
              <h1 class="pf-name" id="pf-name">@user</h1>
              <div class="pf-meta-row">
                <p class="pf-handle" id="pf-handle"></p>
                <span class="pf-member" id="pf-member" hidden></span>
              </div>
            </div>
            <div class="pf-actions" id="pf-actions"></div>
          </div>
          <p class="pf-tagline" id="pf-tagline" hidden></p>
          <p class="pf-bio" id="pf-bio" hidden></p>
          <a class="pf-link" id="pf-link" target="_blank" rel="noopener nofollow ugc" hidden></a>

          <div class="pf-stats">
            <div class="pf-stat"><b id="pf-plays">0</b><span>plays</span></div>
            <div class="pf-stat"><b id="pf-followers">0</b><span>followers</span></div>
            <div class="pf-stat"><b id="pf-games-count">0</b><span>games</span></div>
          </div>

          <div class="pf-xp-card" id="pf-xp" hidden></div>
        </div>
      </div>
    </div>

    <section class="pf-games pf-card pf-games-card">
      <div class="pf-games-head">
        <h2><span class="pf-tab-dot"></span> Published games</h2>
        <span class="pf-games-count" id="pf-grid-count">0</span>
      </div>
      <div class="pf-game-grid" id="pf-grid"></div>
    </section>
  </div>
</div>

<div class="pf-status-wrap" id="pf-status"></div>

<div class="pf-modal hidden" id="pf-edit">
  <div class="pf-sheet">
    <div class="pf-sheet-head">
      <h3>Customize your page</h3>
      <button class="pf-sheet-close" id="pf-edit-cancel" type="button" aria-label="Close">×</button>
    </div>
    <div class="pf-sheet-body">
      <div class="pf-field">
        <label>Banner</label>
        <div class="pf-banner-edit" id="pf-edit-banner-preview">
          <span class="pf-banner-placeholder">drop a banner image</span>
        </div>
        <div class="pf-file-row">
          <input type="file" id="pf-edit-banner-file" accept="image/*">
          <button type="button" class="pf-text-btn" id="pf-edit-banner-clear">Remove</button>
        </div>
      </div>
      <div class="pf-field">
        <label for="pf-edit-bg">Page color</label>
        <div class="pf-bg-row">
          <input type="color" id="pf-edit-bg" value="#FFFBF0">
          <div class="pf-bg-presets" id="pf-edit-bg-presets"></div>
        </div>
      </div>
      <div class="pf-field">
        <label>Profile photo</label>
        <div class="pf-avatar-edit-row">
          <div class="pf-avatar-edit-slot">
            <div class="pf-avatar-prev" id="pf-edit-prev">S</div>
          </div>
          <input type="file" id="pf-edit-file" accept="image/*">
        </div>
      </div>
      <div class="pf-field">
        <label for="pf-edit-name">Display name</label>
        <input type="text" id="pf-edit-name" maxlength="40">
      </div>
      <div class="pf-field">
        <label for="pf-edit-tagline">Tagline</label>
        <input type="text" id="pf-edit-tagline" maxlength="80" placeholder="what you cook…">
      </div>
      <div class="pf-field">
        <label for="pf-edit-bio">Bio</label>
        <textarea id="pf-edit-bio" maxlength="300" rows="3"></textarea>
      </div>
      <div class="pf-field">
        <label for="pf-edit-link">Link</label>
        <input type="text" id="pf-edit-link" maxlength="200" placeholder="yoursite.com">
      </div>
    </div>
    <div class="pf-sheet-foot">
      <p class="pf-error" id="pf-edit-error"></p>
      <div class="pf-foot-btns">
        <button class="pf-cancel" id="pf-edit-cancel-foot" type="button">Cancel</button>
        <button class="pf-save" id="pf-edit-save" type="button">Save profile</button>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module" src="js/profile.js"></script>
</body>
</html>

<style>
.profile-head {
  max-width: 1180px;
  margin: 0 auto;
  padding: 40px 24px 8px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.profile-avatar {
  width: 84px; height: 84px;
  border-radius: 18px;
  background: var(--pk, #FF4EB8);
  border: 3px solid var(--ink, #14121f);
  box-shadow: 4px 4px 0 var(--ink, #14121f);
  display: grid; place-items: center;
  font-family: 'Fredoka One', system-ui, sans-serif;
  font-size: 38px; color: #fff;
  object-fit: cover;
  flex: none;
}
.profile-meta h1 { margin: 0; font-family: 'Fredoka One', system-ui, sans-serif; font-size: clamp(26px, 5vw, 40px); }
.profile-meta .handle { color: var(--soft, #6b6780); font-weight: 800; }
.profile-meta .stat { margin-top: 6px; font-weight: 700; color: var(--soft, #6b6780); }
.profile-games { max-width: 1180px; margin: 8px auto 80px; padding: 0 24px; }
.profile-section-title {
  font-family: 'Fredoka One', system-ui, sans-serif;
  font-size: 20px; margin: 18px 0 14px;
}
.profile-empty, .profile-missing {
  text-align: center; padding: 60px 20px; color: var(--soft, #6b6780); font-weight: 800;
}
.profile-missing a, .profile-empty a { color: var(--pk, #FF4EB8); }
</style>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/ai.css">
<link rel="stylesheet" href="css/v2.css">
<link rel="stylesheet" href="css/brand.css">
<link rel="stylesheet" href="css/search.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/profile.css">
</head>
<body class="pf-root">

<div id="toast-container"></div>

<nav class="site-nav">
  <a class="brand" href="/">
    <span class="wordmark">slop<span class="dot-pk">.</span>game</span>
  </a>
  <div class="nav-links" id="nav-links">
    <div class="nav-drawer-search">
      <label class="nav-search nav-search-drawer" for="nav-drawer-search-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="nav-drawer-search-input" placeholder="search players &amp; games…" autocomplete="off">
      </label>
    </div>
    <a href="/#games">Browse</a>
    <a href="studio.html" class="nav-studio">Studio</a>
    <a href="/#multiplayer">Multiplayer</a>
    <a href="/#publish">Publish</a>
    <a class="nav-drawer-profile" href="studio.html">Cook a Game</a>
    <button class="nav-drawer-signout" id="nav-drawer-signout" type="button" hidden>Sign out</button>
  </div>
  <div class="nav-right">
    <label class="nav-search nav-search-bar" for="nav-search-input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="nav-search-input" placeholder="search…" autocomplete="off">
    </label>
    <span id="nav-auth"></span>
    <button class="nav-burger" id="nav-burger" type="button" aria-label="menu" aria-expanded="false" aria-controls="nav-links">
      <span class="nav-burger-lines" aria-hidden="true"></span>
    </button>
  </div>
</nav>

<div id="pf-shell" hidden>
  <div class="pf-canvas" id="pf-page">
    <header class="pf-cover-block">
      <div class="pf-cover" id="pf-banner">
        <img class="pf-cover-img" id="pf-banner-img" alt="" hidden>
      </div>
      <div class="pf-cover-bar">
        <div class="pf-avatar-ring">
          <div class="pf-avatar" id="pf-avatar">S</div>
        </div>
        <div class="pf-actions" id="pf-actions"></div>
      </div>
    </header>

    <div class="pf-body">
      <h1 class="pf-name" id="pf-name">Name</h1>
      <p class="pf-handle" id="pf-handle">@user</p>
      <p class="pf-tagline" id="pf-tagline" hidden></p>
      <p class="pf-bio" id="pf-bio" hidden></p>
      <a class="pf-link" id="pf-link" target="_blank" rel="noopener nofollow ugc" hidden></a>
      <p class="pf-joined" id="pf-member" hidden></p>

      <div class="pf-counts">
        <span><strong id="pf-followers">0</strong> <span>Followers</span></span>
        <span><strong id="pf-plays">0</strong> <span>Plays</span></span>
        <span><strong id="pf-games-count">0</strong> <span>Games</span></span>
      </div>

      <div class="pf-xp-block" id="pf-xp" hidden></div>

      <nav class="pf-tabs" aria-label="Profile sections">
        <span class="pf-tab active">Games <em id="pf-grid-count">0</em></span>
      </nav>

      <div class="pf-feed" id="pf-grid"></div>
    </div>
  </div>
</div>

<div class="pf-status-wrap" id="pf-status"></div>

<div class="pf-modal hidden" id="pf-edit">
  <div class="pf-dialog">
    <header class="pf-dialog-head">
      <button class="pf-dialog-close" id="pf-edit-cancel" type="button" aria-label="Close">×</button>
      <h3>Edit profile</h3>
      <button class="pf-dialog-save" id="pf-edit-save" type="button">Save</button>
    </header>
    <div class="pf-dialog-body">
      <div class="pf-field">
        <label>Banner</label>
        <div class="pf-cover-edit" id="pf-edit-banner-preview">
          <span class="pf-cover-placeholder">Add a header photo</span>
        </div>
        <div class="pf-field-row">
          <input type="file" id="pf-edit-banner-file" accept="image/*">
          <button type="button" class="pf-link-btn" id="pf-edit-banner-clear">Remove</button>
        </div>
      </div>
      <div class="pf-field">
        <label for="pf-edit-bg">Background color</label>
        <div class="pf-bg-row">
          <input type="color" id="pf-edit-bg" value="#FFFFFF">
          <div class="pf-bg-presets" id="pf-edit-bg-presets"></div>
        </div>
      </div>
      <div class="pf-field">
        <label>Profile photo</label>
        <div class="pf-photo-row">
          <div class="pf-avatar-prev" id="pf-edit-prev">S</div>
          <input type="file" id="pf-edit-file" accept="image/*">
        </div>
      </div>
      <div class="pf-field">
        <label for="pf-edit-name">Name</label>
        <input type="text" id="pf-edit-name" maxlength="40">
      </div>
      <div class="pf-field">
        <label for="pf-edit-tagline">Tagline</label>
        <input type="text" id="pf-edit-tagline" maxlength="80">
      </div>
      <div class="pf-field">
        <label for="pf-edit-bio">Bio</label>
        <textarea id="pf-edit-bio" maxlength="300" rows="3"></textarea>
      </div>
      <div class="pf-field">
        <label for="pf-edit-link">Website</label>
        <input type="text" id="pf-edit-link" maxlength="200" placeholder="https://">
      </div>
      <p class="pf-error" id="pf-edit-error"></p>
    </div>
  </div>
</div>

<script type="module" src="js/profile.js"></script>
</body>
</html>

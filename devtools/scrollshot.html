<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>scrollshot — iframe scroll wrapper for headless capture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #111; }
  iframe { display: block; width: 100vw; height: 100vh; border: none; }
  .hud {
    position: fixed; top: 8px; left: 8px; z-index: 9;
    font: 12px/1.4 ui-monospace, monospace; color: #fff;
    background: rgba(0,0,0,.55); padding: 6px 10px; border-radius: 8px;
  }
</style>
</head>
<body>
<div class="hud" id="hud">loading…</div>
<iframe id="frame" title="scroll target"></iframe>
<script>
const params = new URLSearchParams(location.search);
const target = params.get('url') || '/index.html';
const scrollY = Number(params.get('y') ?? params.get('scroll') ?? 2400);
const frame = document.getElementById('frame');
const hud = document.getElementById('hud');

frame.src = target.startsWith('http') ? target : new URL(target, location.origin).pathname;

frame.addEventListener('load', () => {
  const win = frame.contentWindow;
  const doc = win.document;
  const apply = () => {
    win.scrollTo({ top: scrollY, behavior: 'instant' in win ? 'instant' : 'auto' });
    win.dispatchEvent(new Event('scroll'));
    const nav = doc.querySelector('.site-nav.nav--hideable');
    const shown = nav?.classList.contains('nav--show');
    hud.textContent = `${target} · scrollY=${win.scrollY} · nav--show=${shown ?? 'n/a'}`;
  };
  if (doc.readyState === 'complete') {
    requestAnimationFrame(() => { apply(); setTimeout(apply, 600); setTimeout(apply, 1500); });
  } else {
    win.addEventListener('load', () => {
      setTimeout(apply, 400);
      setTimeout(apply, 1200);
    });
  }
});
</script>
</body>
</html>

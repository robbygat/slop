# fly.io deploy config — `fly launch --copy-config` then `fly deploy`
# Set the AI key as a secret first:  fly secrets set XAI_API_KEY=xai-...
app = "slop-game"
primary_region = "iad"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/slop.db"

[mounts]
  source = "slop_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

<!DOCTYPE html>

<title>slop.game</title>

<!--
  GitHub Pages serves this file for any path it can't find on disk. We use it as
  a tiny client-side router so the pretty URLs work on the static site:
    /play/{slug}  → the player page (play.html), which restores the pretty URL
    /{username}   → the profile page (profile.html)
  Real files (js/, css/, games/, *.html …) are served directly and never hit this.
-->
<script>
(function () {
  var path = location.pathname.replace(/^\/+|\/+$/g, '');
  var parts = path ? path.split('/') : [];
  // top-level names that are real files/folders, not usernames
  var reserved = { play:1, studio:1, index:1, profile:1, js:1, css:1, assets:1,
                   games:1, scripts:1, supabase:1, 'favicon.ico':1, 'robots.txt':1, 'sitemap.xml':1 };
  var search = location.search || '';
  if (parts[0] === 'play' && parts[1]) {
    location.replace('/play.html?slug=' + encodeURIComponent(parts[1]) + search.replace(/^\?/, '&'));
  } else if (parts.length === 1 && parts[0] && !reserved[parts[0].toLowerCase()] && parts[0].indexOf('.') === -1) {
    location.replace('/profile.html?u=' + encodeURIComponent(parts[0]));
  } else {
    location.replace('/');
  }
})();
</script>
</head>
<body></body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOPCRAFT — SLOP.game</title>
<meta name="description" content="a voxel sandbox: mine, build, and reshape an infinite-feeling blocky world. first-person, fully destructible, saves your builds.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2218%22 fill=%22%235FA855%22/><rect y=%2240%22 width=%22100%22 height=%2260%22 fill=%22%23795548%22/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
--y: #FFE135; --pk: #FF4EB8; --bl: #4ECAFF; --mt: #3DFFB0;
--cr: #FFFBF0; --wh: #FFFFFF; --ink: #1A1A2E; --soft: #3A3A5C;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(--cr);
color: var(--ink);
font-family: 'Nunito', sans-serif;
height: 100vh;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
}

.back-link {
position: fixed;
top: 16px;
left: 16px;
z-index: 50;
font-family: 'Space Mono', monospace;
font-weight: 700;
font-size: 13px;
color: var(--ink);
text-decoration: none;
background: var(--wh);
border: 2.5px solid var(--ink);
border-radius: 100px;
padding: 8px 16px;
box-shadow: 3px 3px 0 var(--ink);
transition: transform .12s ease, box-shadow .12s ease;
}
.back-link:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }

#stage {
position: relative;
width: min(96vw, 170vh);
aspect-ratio: 16 / 9;
border: 3px solid var(--ink);
border-radius: 14px;
box-shadow: 8px 8px 0 var(--ink);
overflow: hidden;
background: #87CEEB;
}

#stage canvas { width: 100%; height: 100%; display: block; }

/* crosshair */
.crosshair {
position: absolute;
top: 50%;
left: 50%;
width: 18px;
height: 18px;
transform: translate(-50%, -50%);
pointer-events: none;
z-index: 5;
}
.crosshair::before, .crosshair::after {
content: '';
position: absolute;
background: rgba(255,255,255,0.9);
box-shadow: 0 0 2px rgba(0,0,0,0.8);
}
.crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
.crosshair::after { top: 8px; left: 0; width: 18px; height: 2px; }

/* hotbar */
.hotbar {
position: absolute;
bottom: 14px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 6px;
z-index: 5;
background: rgba(26,26,46,0.55);
border-radius: 14px;
padding: 7px;
backdrop-filter: blur(3px);
}
.slot {
width: 52px;
height: 52px;
border: 2.5px solid rgba(255,255,255,0.45);
border-radius: 10px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 2px;
cursor: pointer;
}
.slot.active { border-color: var(--y); background: rgba(255,225,53,0.18); }
.slot .swatch { width: 24px; height: 24px; border-radius: 5px; border: 2px solid rgba(0,0,0,0.4); }
.slot .num {
font-family: 'Space Mono', monospace;
font-size: 9px;
font-weight: 700;
color: rgba(255,255,255,0.85);
}

/* block name toast */
#block-name {
position: absolute;
bottom: 84px;
left: 50%;
transform: translateX(-50%);
font-family: 'Fredoka One', cursive;
font-size: 15px;
color: #fff;
text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
z-index: 5;
opacity: 0;
transition: opacity .2s ease;
pointer-events: none;
}
#block-name.on { opacity: 1; }

/* intro / pause overlay */
.overlay {
position: absolute;
inset: 0;
z-index: 20;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 16px;
background: rgba(26, 26, 46, 0.66);
backdrop-filter: blur(4px);
text-align: center;
padding: 24px;
cursor: pointer;
}
.overlay.hidden { display: none; }

.ov-card {
background: var(--cr);
border: 3px solid var(--ink);
border-radius: 18px;
box-shadow: 8px 8px 0 var(--ink);
padding: 34px 40px;
max-width: 480px;
}

.ov-title {
font-family: 'Fredoka One', cursive;
font-size: 42px;
color: var(--ink);
}
.ov-title .green { color: #5FA855; }

.ov-sub {
margin-top: 6px;
font-family: 'Space Mono', monospace;
font-weight: 700;
font-size: 12.5px;
color: var(--soft);
}

.ov-controls {
margin-top: 18px;
font-family: 'Space Mono', monospace;
font-size: 12.5px;
color: var(--soft);
line-height: 2;
text-align: left;
}
.ov-controls b { color: var(--ink); }

.ov-cta {
margin-top: 20px;
display: inline-block;
font-family: 'Fredoka One', cursive;
font-size: 17px;
color: var(--wh);
background: var(--pk);
border: 3px solid var(--ink);
border-radius: 100px;
padding: 12px 30px;
box-shadow: 4px 4px 0 var(--ink);
}
</style>
</head>
<body>

<a class="back-link" href="/index.html#games" target="_top">← SLOP.game</a>

<div id="stage">
<div class="crosshair"></div>
<div class="hotbar" id="hotbar"></div>
<div id="block-name"></div>

<div class="overlay" id="overlay">
<div class="ov-card">
<h1 class="ov-title">SLOP<span class="green">CRAFT</span></h1>
<p class="ov-sub">mine it. stack it. lose an afternoon to it.</p>
<div class="ov-controls">
<b>WASD</b> — move &nbsp; <b>SPACE</b> — jump &nbsp; <b>mouse</b> — look<br>
<b>left click</b> — break block &nbsp; <b>right click</b> — place block<br>
<b>1-8 / scroll</b> — pick a block &nbsp; <b>ESC</b> — pause<br>
your edits save automatically on this device
</div>
<span class="ov-cta" id="ov-cta">Click to play</span>
</div>
</div>
</div>

<script src="/games/play-embed.js"></script>
<script type="module" src="game.js?v=5"></script>
<script type="module">
import { mountRemixDock } from '../../js/remix-dock.js';
mountRemixDock({
gameId: 'slopcraft',
title: 'remix slopcraft — live',
apiName: 'SC',
getApi: () => window.SC,
sources: ['game.js'],
storageKey: 'sc-live-mods',
chips: [
'build a 20-block glowstone tower where I stand',
'turn all water to glowstone',
'give me a jetpack: holding space flies',
'rainbow fog that cycles colors',
'spawn a 10x10 cobblestone castle nearby',
],
describe: `"Slopcraft" — a first-person voxel sandbox on three.js. Procedural terrain in a world Uint8Array (WX*WY*WZ, index (x*WZ+z)*WY+y), chunk meshing, AABB physics, break/place.
KEY API: SC.player = { pos {x,y,z}, vel {x,y,z}, onGround, yaw, pitch } — mutate vel for movement mods (e.g. a per-frame loop guarded by your own requestAnimationFrame) · SC.world (Uint8Array), SC.getBlock(x,y,z), SC.recordEdit(x,y,z,block) writes AND persists a block — call SC.rebuildAround(x,z) after edits to remesh (batch edits, then one rebuild per affected chunk) · SC.consts = { WX:128, WY:48, WZ:128, CHUNK, WATER_LEVEL, AIR, GRASS, DIRT, STONE, SAND, WATER, LOG, PLANKS, COBBLE, GLOWSTONE } · SC.BLOCKS block defs (colors) · SC.surfaceY(x,z) · SC.camera / SC.scene / SC.THREE for visual mods (fog is scene.fog) · SC.breakBlock(), SC.placeBlock(), SC.raycast() · SC.gameMsg(text) · SC.hooks free object for your state.`,
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlopKart — SLOP.game</title>
<meta name="description" content="a fully 3D kart racer — drift for boost, grab items, sling shells, and race AI or 4 friends online across a neon circuit. remixable mid-race.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%234ECAFF%22/><text x=%2250%22 y=%2258%22 text-anchor=%22middle%22 font-family=%22system-ui,sans-serif%22 font-size=%2248%22 font-weight=%22700%22 fill=%22%23FFFFFF%22>K</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0B0A14; color: #fff; font-family: 'Nunito', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.back-link { position: fixed; top: 14px; left: 14px; z-index: 60; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 12.5px; color: #fff; text-decoration: none; background: rgba(20,18,34,.7); backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,.18); border-radius: 100px; padding: 8px 16px; transition: border-color .12s; }
.back-link:hover { border-color: #FF4EB8; }

#shell { display: flex; align-items: stretch; justify-content: center; width: 100vw; height: 100vh; padding: 14px; }
#stage-wrap { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; }
#stage { position: relative; width: min(100%, calc((100vh - 28px) * 16 / 10)); aspect-ratio: 16/10; border-radius: 14px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,.6), 0 0 0 3px #1A1A2E; }
#c { width: 100%; height: 100%; display: block; background: linear-gradient(180deg, #2A1A5E 0%, #6C2BC0 45%, #FF4EB8 100%); }

/* HUD */
.hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; font-family: 'Fredoka One', cursive; }
.hud .tl { position: absolute; top: 18px; left: 18px; }
.hud .lap { font-size: 30px; text-shadow: 0 3px 0 rgba(0,0,0,.35); }
.hud .lap small { font-size: 15px; opacity: .8; }
.hud .pos { position: absolute; top: 16px; right: 18px; text-align: right; }
.hud .pos .p { font-size: 44px; line-height: 1; text-shadow: 0 3px 0 rgba(0,0,0,.4); }
.hud .pos .p sup { font-size: 20px; }
.hud .pos .of { font-family: 'Space Mono', monospace; font-size: 12px; opacity: .8; }
.hud .speed { position: absolute; bottom: 18px; left: 18px; font-family: 'Space Mono', monospace; font-weight: 700; }
.hud .speed b { font-family: 'Fredoka One', cursive; font-size: 26px; }
.hud .item-slot { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); width: 76px; height: 76px; border-radius: 18px; background: rgba(20,18,34,.55); border: 3px solid rgba(255,255,255,.4); display: grid; place-items: center; font-size: 38px; backdrop-filter: blur(6px); }
.hud .item-slot.spin { animation: itemSpin .6s ease; }
@keyframes itemSpin { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.18) rotate(12deg)} }
.hud .laptime { position: absolute; bottom: 18px; right: 18px; text-align: right; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; }
.hud .laptime b { font-family: 'Fredoka One', cursive; font-size: 18px; display: block; }
#minimap { position: absolute; top: 70px; right: 18px; width: 130px; height: 130px; background: rgba(20,18,34,.45); border: 2px solid rgba(255,255,255,.25); border-radius: 14px; backdrop-filter: blur(4px); }
.center-msg { position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%); font-size: clamp(40px, 8vw, 96px); text-shadow: 0 5px 0 rgba(0,0,0,.4); opacity: 0; transition: opacity .2s, transform .2s; }
.center-msg.on { opacity: 1; }
.boost-flash { position: absolute; inset: 0; pointer-events: none; box-shadow: inset 0 0 120px rgba(78,202,255,0); transition: box-shadow .2s; }
.boost-flash.on { box-shadow: inset 0 0 120px rgba(78,202,255,.5); }

/* overlays */
.overlay { position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; text-align: center; padding: 28px; background: radial-gradient(ellipse at 50% 30%, rgba(108,43,192,.5), rgba(11,10,20,.93) 70%); }
.overlay.hidden { display: none; }
.title-logo { font-family: 'Fredoka One', cursive; font-size: clamp(46px, 9vw, 104px); line-height: .9; letter-spacing: -2px; }
.title-logo .k { color: #FFE135; text-shadow: 0 0 30px rgba(255,225,53,.5), 0 5px 0 #1A1A2E; }
.title-logo .s { background: linear-gradient(110deg,#FF4EB8,#4ECAFF); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { font-family: 'Space Mono', monospace; font-size: 13px; color: rgba(255,255,255,.65); max-width: 460px; line-height: 1.7; }
.gbtn { font-family: 'Fredoka One', cursive; font-size: 18px; color: #fff; background: #FF4EB8; border: 3px solid #1A1A2E; border-radius: 100px; padding: 14px 34px; cursor: pointer; box-shadow: 0 8px 0 #1A1A2E; transition: transform .1s, box-shadow .1s; }
.gbtn:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #1A1A2E; }
.gbtn:active { transform: translateY(4px); box-shadow: 0 4px 0 #1A1A2E; }
.gbtn.blue { background: #4ECAFF; color: #1A1A2E; }
.gbtn.alt { background: #2A2740; box-shadow: 0 8px 0 #000; }
.btn-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
.hiscore { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; color: #FFE135; background: rgba(0,0,0,.3); border: 2px solid rgba(255,255,255,.2); border-radius: 100px; padding: 8px 20px; }
#room-code { font-family: 'Space Mono', monospace; font-weight: 700; font-size: clamp(22px,3.6vw,38px); color: #3DFFB0; background: rgba(0,0,0,.4); border: 3px solid #1A1A2E; border-radius: 12px; padding: 12px 28px; letter-spacing: 2px; }
.share-row { display: flex; gap: 10px; width: min(460px,90%); }
.share-row input { flex: 1; font-family: 'Space Mono', monospace; font-size: 12px; color: #cfcce0; background: rgba(0,0,0,.4); border: 2px solid rgba(255,255,255,.2); border-radius: 100px; padding: 11px 18px; outline: none; min-width: 0; }
.lobby-meta { font-weight: 800; font-size: 15px; color: #cfcce0; }
.results-row { display: flex; flex-direction: column; gap: 6px; font-family: 'Space Mono', monospace; font-size: 14px; }
.results-row .r1 { color: #FFE135; font-size: 20px; font-family: 'Fredoka One', cursive; }
.controls { font-family: 'Space Mono', monospace; font-size: 11.5px; color: rgba(255,255,255,.5); line-height: 1.9; }
.controls b { color: rgba(255,255,255,.8); }

@media (max-width: 760px) { #shell { padding: 6px; } }
</style>
</head>
<body>
<a class="back-link" href="/index.html#games" target="_top">← SLOP.game</a>

<div id="shell">
<div id="stage-wrap">
<div id="stage">
<canvas id="c"></canvas>
<div class="hud" id="hud">
<div class="tl"><div class="lap" id="lap">LAP <span id="lap-n">1</span><small>/3</small></div></div>
<div class="pos"><div class="p" id="pos">1<sup>st</sup></div><div class="of" id="of">of 4</div></div>
<canvas id="minimap" width="130" height="130"></canvas>
<div class="speed"><b id="kmh">0</b> km/h</div>
<div class="item-slot" id="item-slot"></div>
<div class="laptime"><span>lap</span><b id="curtime">0.0</b><span id="besttime"></span></div>
<div class="boost-flash" id="boost-flash"></div>
<div class="center-msg" id="center-msg"></div>
</div>

<!-- title -->
<div class="overlay" id="ov-title">
<div class="title-logo"><span class="s">SLOP</span><span class="k">KART</span></div>
<p class="subtitle">drift to charge turbo · grab item boxes · sling shells · first to 3 laps wins. race the AI or 4 friends online.</p>
<div class="hiscore">best lap: <span id="hi-lap">—</span></div>
<div class="btn-row">
<button class="gbtn" id="btn-single">Single Race</button>
<button class="gbtn blue" id="btn-multi">Race Friends</button>
</div>
<p class="controls"><b>W/↑</b> gas · <b>S/↓</b> brake · <b>A D / ← →</b> steer · <b>SPACE</b> drift · <b>SHIFT/E</b> use item</p>
</div>

<!-- lobby -->
<div class="overlay hidden" id="ov-lobby">
<div class="title-logo" style="font-size:clamp(24px,4vw,40px)" id="lobby-title">RACE LOBBY</div>
<div id="room-code">·····</div>
<div class="share-row"><input id="share-link" readonly value=""><button class="gbtn alt" id="copy-link" style="font-size:13px;padding:9px 18px">Copy</button></div>
<p class="lobby-meta" id="lobby-count">1 racer</p>
<div class="btn-row">
<button class="gbtn" id="btn-start">Start Race</button>
<button class="gbtn alt" id="btn-leave">← Back</button>
</div>
</div>

<!-- results -->
<div class="overlay hidden" id="ov-results">
<div class="title-logo" style="font-size:clamp(30px,5vw,56px)" id="res-title">FINISH!</div>
<div class="results-row" id="res-list"></div>
<div class="btn-row">
<button class="gbtn" id="btn-again">Race Again</button>
<button class="gbtn alt" id="btn-title">← Title</button>
</div>
</div>
</div>
</div>
<!-- remix dock mounts here -->
</div>

<script src="/games/play-embed.js"></script>
<script type="module" src="game.js"></script>
<script type="module">
import { mountRemixDock } from '../../js/remix-dock.js';
mountRemixDock({
gameId: 'slopkart',
title: 'remix slopkart — live',
apiName: 'SK',
getApi: () => window.SK,
sources: ['game.js'],
storageKey: 'sk-live-mods',
shell: '#shell',
chips: [
'make my kart leave a rainbow trail',
'turbo boost lasts twice as long',
'low gravity moon physics',
'shells home in harder and are huge',
'give everyone double top speed',
'the track is bouncy like jelly',
],
describe: `"SlopKart" — a fully 3D arcade kart racer on three.js. Karts drift around a neon Catmull-Rom circuit; drift charges a turbo boost; item boxes grant boost/shell/banana; first to 3 laps wins. Single-player vs AI and host-authoritative online multiplayer.
KEY API on window.SK:
- SK.config — LIVE tunables, mutate to change gameplay instantly: { maxSpeed, accel, turnRate, drag, driftTurn, boostMul, boostTime, gravity, laps, itemRate, offTrackMul, shellSpeed }.
- SK.player — your kart { pos:{x,y,z}, heading, speed, drift, driftCharge, item, boostT, spinT, lap, progress, color }. SK.karts — all karts (AI + players), same shape; .ai flag for bots.
- SK.track — { curve (THREE.CatmullRomCurve3, closed), samples:[{x,z,tangent,normal}], halfWidth, length }.
- SK.projectiles (shells), SK.bananas, SK.itemBoxes — live arrays.
- SK.THREE, SK.scene, SK.camera, SK.renderer — for visual mods (add meshes, change materials/lights/fog). Each kart has kart.mesh (a THREE.Group).
- SK.hooks — set hooks.onUpdate(dt), hooks.postRender(), hooks.onKartUpdate(kart,dt), hooks.onItemUse(kart,item), hooks.onLap(kart) for logic; checked every frame, wrap in try/catch.
- SK.giveItem(kart,type) types: 'boost'|'shell'|'banana'. SK.spawnShell(kart). SK.gameMsg(text). SK.consts={COLORS}.
- In multiplayer the HOST simulates everything; gameplay mods run on the host and the dock auto-syncs them to the room.`,
});
</script>
</body>
</html>

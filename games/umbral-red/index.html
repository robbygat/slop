<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRAL RED — SLOP.game</title>
<meta name="description" content="a creature-taming RPG from an alternate universe. roam the tall grass, battle wild umbrae, and bind them to your lantern.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23801818%22/><circle cx=%2250%22 cy=%2250%22 r=%2226%22 fill=%22%23FFD86B%22/></svg>">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background:
radial-gradient(circle at 12% 16%, rgba(224,69,69,0.07), transparent 30%),
radial-gradient(circle at 88% 82%, rgba(255,216,107,0.10), transparent 32%),
#FFFBF0;
color: #1A1A2E;
font-family: 'Nunito', sans-serif;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}

.back-link {
position: fixed;
top: 16px;
left: 16px;
z-index: 50;
font-family: 'Space Mono', monospace;
font-weight: 700;
font-size: 13px;
color: #1A1A2E;
text-decoration: none;
background: #FFFFFF;
border: 2.5px solid #1A1A2E;
border-radius: 100px;
padding: 8px 16px;
box-shadow: 3px 3px 0 #1A1A2E;
transition: transform .12s ease, box-shadow .12s ease;
}
.back-link:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 #1A1A2E; }

#stage {
position: relative;
width: min(96vw, 133vh);
aspect-ratio: 4 / 3;
}

canvas {
width: 100%;
height: 100%;
display: block;
background: #0F0F1A;
border: 3px solid #1A1A2E;
border-radius: 12px;
box-shadow: 8px 8px 0 #1A1A2E;
image-rendering: pixelated;
}
</style>
</head>
<body>

<a class="back-link" href="/index.html#games" target="_top">← SLOP.game</a>

<div id="stage">
<canvas id="game-canvas" width="800" height="600"></canvas>
</div>

<script src="/games/play-embed.js"></script>
<script type="module" src="game.js"></script>
<script type="module">
import { mountRemixDock } from '../../js/remix-dock.js';
mountRemixDock({
gameId: 'umbral-red',
title: 'remix umbral red — live',
apiName: 'UR',
getApi: () => window.UR,
sources: ['game.js'],
storageKey: 'ur-live-mods',
chips: [
'all wild umbrae are level 20',
'double encounter rate in tall grass',
'my whole party heals after every battle',
'add a shiny 1-in-10 recolor to wild umbrae',
'catching is guaranteed',
],
describe: `"Umbral Red" — a tile-based creature-taming RPG (canvas 2d, 800x600). Roam an overworld, fight turn-based battles vs wild umbrae, catch them with lanterns, level a party.
KEY API: UR.game = { state ('title'|'world'|'dialog'|'battle'), player {x,y,dir}, party[] (mons), lanterns, battle, t } · UR.SPECIES + UR.MOVES are mutable data tables driving everything (stats, types, moves) — most mods are data edits · UR.makeMon(speciesId, level), UR.recalcStats(mon), UR.startEncounter(), UR.rollWild(), UR.grantXp(mon, xp), UR.endBattle(), UR.save() · UR.hooks.postRender(ctx, game) for visual overlays · UR.gameMsg(text) shows dialog. Mons have { speciesId, level, hp, maxHp, atk, def, spd, moves, xp }.`,
});
</script>
</body>
</html>
